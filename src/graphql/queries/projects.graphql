fragment ProjectFields on Post {
	id
	databaseId
	title
	slug
	featuredImage {
		node {
			sourceUrl
		}
	}
	projectFields {
		area
		rooms
		floor
		bedrooms
		bathrooms
		status
		year
		city
		type
		terrace
		garage
		sauna
		pool
		fireplace
		shortDescription
		...Galleries
	}
	projectLikes
	seo {
		title
		metaDesc
	}
	tags {
		nodes {
			name
			slug
		}
	}
}

fragment Galleries on ProjectFields {
	plansGallery {
		nodes {
			sourceUrl
			mediaDetails {
				height
				width
			}
		}
	}
	processGallery {
		nodes {
			sourceUrl
			mediaDetails {
				height
				width
			}
		}
	}
	resultGallery {
		nodes {
			sourceUrl
			mediaDetails {
				height
				width
			}
		}
	}
}

query GetProjects(
	$first: Int
	$after: String
	$tag: String
	$minArea: Float
	$maxArea: Float
	$floor: Float
	$floors: [Float]
	$minBedrooms: Float
	$maxBedrooms: Float
	$projectStatus: String
	$projectStatuses: [String]
	$sort: String
	$offset: Int
) {
	posts(
		first: $first
		after: $after
		where: {
			tag: $tag
			categoryName: "project"
			minArea: $minArea
			maxArea: $maxArea
			floor: $floor
			floors: $floors
			minBedrooms: $minBedrooms
			maxBedrooms: $maxBedrooms
			projectStatus: $projectStatus
			projectStatuses: $projectStatuses
			sort: $sort
			offset: $offset
		}
	) {
		found
		pageInfo {
			hasNextPage
			endCursor
		}
		nodes {
			...ProjectFields
		}
	}
}

query GetProjectBySlug($slug: ID!) {
	post(id: $slug, idType: SLUG) {
		...ProjectFields
		content
		projectFields {
			projectVideo {
				node {
					mediaItemUrl
				}
			}
			videoGallery {
				nodes {
					mediaItemUrl
				}
			}
		}
	}
}

query GetAllProjectSlugs {
	posts(first: 1000, where: { categoryName: "project" }) {
		nodes {
			slug
		}
	}
}

query GetTags {
	tags(first: 100, where: { hideEmpty: true, order: DESC, orderby: COUNT }) {
		nodes {
			id
			name
			slug
			count
		}
	}
}

query GetProjectStats {
	projectStats {
		minArea
		maxArea
		minBedrooms
		maxBedrooms
		minFloor
		maxFloor
	}
}

query GetProjectLikes($id: ID!, $idType: PostIdType = ID) {
	post(id: $id, idType: $idType) {
		projectLikes
	}
}
