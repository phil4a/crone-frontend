name: Build & Deploy (Docker Hub → Dokploy)

on:
  push:
    branches: ['main', 'master']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME:
        ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPOSITORY != '' &&
        secrets.DOCKERHUB_REPOSITORY || github.event.repository.name }}
      NEXT_PUBLIC_GRAPHQL_API_URL: ${{ secrets.NEXT_PUBLIC_GRAPHQL_API_URL }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
      NEXT_PUBLIC_GOOGLE_MAPS_ID: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_ID }}
      NEXT_PUBLIC_LIGHT_GALLERY_LICENSE_KEY: ${{ secrets.NEXT_PUBLIC_LIGHT_GALLERY_LICENSE_KEY }}
      NEXT_PUBLIC_YANDEX_SMARTCAPTCHA_SITE_KEY:
        ${{ secrets.NEXT_PUBLIC_YANDEX_SMARTCAPTCHA_SITE_KEY }}
      DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
      DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
      DOKPLOY_API_KEY: ${{ secrets.DOKPLOY_API_KEY }}
      DOKPLOY_APPLICATION_ID: ${{ secrets.DOKPLOY_APPLICATION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Validate required build env
        run: |
          if [ -z "$NEXT_PUBLIC_GRAPHQL_API_URL" ]; then
            echo "NEXT_PUBLIC_GRAPHQL_API_URL is required for next build (generateStaticParams uses GraphQL)."
            exit 1
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_GRAPHQL_API_URL=${{ env.NEXT_PUBLIC_GRAPHQL_API_URL }}
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_SITE_URL=${{ env.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ env.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_GOOGLE_MAPS_ID=${{ env.NEXT_PUBLIC_GOOGLE_MAPS_ID }}
            NEXT_PUBLIC_LIGHT_GALLERY_LICENSE_KEY=${{ env.NEXT_PUBLIC_LIGHT_GALLERY_LICENSE_KEY }}
            NEXT_PUBLIC_YANDEX_SMARTCAPTCHA_SITE_KEY=${{ env.NEXT_PUBLIC_YANDEX_SMARTCAPTCHA_SITE_KEY }}

      - name: Trigger Dokploy deploy (Webhook)
        if: ${{ env.DOKPLOY_WEBHOOK_URL != '' }}
        run: |
          curl -sS -X POST "${{ env.DOKPLOY_WEBHOOK_URL }}" \
            -H "content-type: application/json" \
            -d "{}"

      - name: Trigger Dokploy deploy (API)
        if:
          ${{ env.DOKPLOY_WEBHOOK_URL == '' && env.DOKPLOY_URL != '' && env.DOKPLOY_API_KEY != '' &&
          env.DOKPLOY_APPLICATION_ID != '' }}
        run: |
          curl -sS -X POST "${{ env.DOKPLOY_URL }}/api/application.deploy" \
            -H "accept: application/json" \
            -H "content-type: application/json" \
            -H "x-api-key: ${{ env.DOKPLOY_API_KEY }}" \
            -d "{\"applicationId\":\"${{ env.DOKPLOY_APPLICATION_ID }}\"}"
