query GetProjects(
	$first: Int
	$after: String
	$tag: String
	$minArea: Float
	$maxArea: Float
	$floor: Float
	$floors: [Float]
	$minBedrooms: Float
	$maxBedrooms: Float
	$projectStatus: String
	$projectStatuses: [String]
	$offset: Int
) {
	posts(
		first: $first
		after: $after
		where: {
			tag: $tag
			categoryName: "project"
			minArea: $minArea
			maxArea: $maxArea
			floor: $floor
			floors: $floors
			minBedrooms: $minBedrooms
			maxBedrooms: $maxBedrooms
			projectStatus: $projectStatus
			projectStatuses: $projectStatuses
			offset: $offset
		}
	) {
		found
		pageInfo {
			hasNextPage
			endCursor
		}
		nodes {
			id
			databaseId
			title
			slug
			featuredImage {
				node {
					sourceUrl
				}
			}
			projectFields {
				area
				floor
				bedrooms
				status
				year
				city
			}
			projectLikes
			tags {
				nodes {
					name
					slug
				}
			}
		}
	}
}

query GetTags {
	tags(first: 100, where: { hideEmpty: true, order: DESC, orderby: COUNT }) {
		nodes {
			id
			name
			slug
			count
		}
	}
}

query GetProjectStats {
	projectStats {
		minArea
		maxArea
		minBedrooms
		maxBedrooms
		minFloor
		maxFloor
	}
}
